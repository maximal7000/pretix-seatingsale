{% load i18n %}
{% load static %}

<link rel="stylesheet" href="{% static "pretix_seatingsale/seatingsale.css" %}">

{% if not has_seats %}
    <p>{% trans "No seats are available for this event yet." %}</p>
{% else %}
<div class="seatingsale"
     data-show-categories="{% if show_categories %}1{% else %}0{% endif %}"
     data-label-remove="{% trans "Remove seat" %}"
     data-max-per-order="{{ max_per_order }}"
     data-label-max="{% trans "You cannot select more seats than the maximum number of tickets per order." %}">

    {% if show_categories %}
        <div class="seatingsale-legend" id="seatingsale-legend"></div>
    {% endif %}

    <div class="seatingsale-layout">
        <div class="seatingsale-mapwrap">
            <svg id="seatingsale-svg" preserveAspectRatio="xMidYMid meet"></svg>
        </div>

        <div class="seatingsale-side">
            <div class="seatingsale-side-head">
                {% trans "Your selection" %}
                <span class="seatingsale-badge" id="seatingsale-count">0</span>
            </div>

            <p id="seatingsale-empty" class="seatingsale-empty">
                {% trans "Click a free seat on the map to select it." %}
            </p>

            <div id="seatingsale-list" class="seatingsale-list"></div>

            <p id="seatingsale-maxhint" class="seatingsale-maxhint" hidden></p>

            <div class="seatingsale-total" id="seatingsale-total" hidden>
                <span>{% trans "Total" %}</span>
                <strong id="seatingsale-total-value"></strong>
            </div>

            <button type="submit" id="seatingsale-submit"
                    class="btn btn-primary btn-block" disabled>
                {% trans "Add to cart" %}
            </button>
        </div>
    </div>

    <script type="application/json" id="seatingsale-data">{{ seats_json|safe }}</script>
    <script type="application/json" id="seatingsale-cats">{{ categories_json|safe }}</script>
    <script src="{% static "pretix_seatingsale/seatingsale.js" %}" defer></script>
</div>
{% endif %}
